name: Generate package-lock PR
on:
  workflow_dispatch:

jobs:
  generate-lock-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (generate lockfile)
        run: npm install

      - name: Create pull request with package-lock.json
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore(ci): add package-lock.json
          branch: add-package-lock-${{ github.run_id }}
          title: Add package-lock.json
          body: This PR adds package-lock.json generated by workflow.
          base: main
          paths: |
            package-lock.json
